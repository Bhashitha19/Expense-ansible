  log_file="/tmp/expense.log"
    color="\e[33m"
    echo -e "${color} installing Nginx \e[0m"
    dnf install nginx -y &>>$log_file
    echo $?
    
    echo -e "${color} Copy Expense Config file \e[0m"
    cp expense.conf /etc/nginx/default.d/expense.conf &>>$log_file
    echo $?
    
    echo -e "${color} Clean old Nginx Content \e[0m"
    rm -rf /usr/share/nginx/html/* &>>$log_file
    echo $?
    
    echo -e "${color} Download Frontend Application Code \e[0m"
    curl -o /tmp/frontend.zip https://expense-artifacts.s3.amazonaws.com/frontend.zip &>>$log_file
    echo $?
    
    echo -e "${color} Extract Downloaded Application Content \e[0m"
    cd /usr/share/nginx/html &>>$log_file
    unzip /tmp/frontend.zip &>>$log_file
    echo $?
    
    echo -e "${color} Starting Nginx Service \e[0m"
    systemctl enable nginx &>>$log_file
    systemctl restart nginx &>>$log_file
  echo $?
    - name: Expense Frontend setup
  hosts: all
  become: yes
  tasks:
    - name: Installing Nginx
      ansible.builtin.dnf:
        name: Nginx
        state: present
    - name: copy Expense config file
      ansible.builtin.copy:
        src: expense.conf
        dest: /etc/nginx/default.d/expense.conf
    - name: Clean Old Nginx Dir
      ansible.builtin.file:
        path: /usr/share/nginx/html
        state: absent
    - name: Create Nginx Dir
      ansible.builtin.file:
        path: /usr/share/nginx/html
        state: directory
    - name: Download and Extract Frontend Content
      ansible.builtin.unarchive:
        src: https://expense-artifacts.s3.amazonaws.com/frontend.zip
        dest: /usr/share/nginx/html
        remote_src: yes
    - name: Start Nginx service
      ansible.builtin.systemd:
         name: Nginx
         state: restarted
         enabled: yes